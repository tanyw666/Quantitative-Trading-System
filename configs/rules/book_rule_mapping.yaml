version: 1
name: book_rule_mapping
purpose: >
  Convert the selected trading, value investing, tactical, and discipline books
  into system-owned rules. This file is the source map for future screening,
  entry, sizing, exit, and review logic.

required_rule_fields:
  - id
  - layer
  - source_books
  - principle
  - quant_rules
  - manual_checks
  - system_targets
  - rollout_priority

