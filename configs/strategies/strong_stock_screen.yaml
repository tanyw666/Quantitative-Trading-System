name: strong_stock_screen
description: 强势股筛选样例，面向短线候选池
strategy: strong_stock_screen
params:
  min_20d_return: 0.12
  min_volume_ratio: 1.5
  max_volume_ratio: 6.0
  max_atr_pct: 0.12
  min_ma20_slope: 0.0
  max_close_ma20_gap: 0.45
  max_rsi: 90.0
  min_traded_value: 20000000
  min_entry_structure_score: 55.0
  max_chase_risk_score: 35.0
  max_candle_warning_count: 1
  block_false_breakout: true
constraint_policy:
  window_days: 7
  single_block_pause: 2
  cooldown_block_count: 2
  warn_escalation_count: 2
  recover_after_clean_days: 3
  warn_exposure_multiplier: 0.50
